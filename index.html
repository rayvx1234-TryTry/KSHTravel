<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高雄智慧導航 V3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="control-panel">
            <div class="panel-header">
                <div class="header-title">
                    <h1>🚇 K-Transit</h1>
                    <p>高雄全能轉乘系統</p>
                </div>
                <button id="themeToggle" class="icon-btn" title="切換夜間模式">🌙</button>
            </div>

            <div class="search-section">
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon">📍</span>
                        <input type="text" id="originInput" placeholder="輸入起點 或 使用目前位置" autocomplete="off" data-type="origin">
                        <button id="useLocationBtn" class="icon-btn small" title="我的位置">🎯</button>
                    </div>
                    <div id="originDropdown" class="autocomplete-dropdown hidden"></div>
                </div>

                <button id="swapBtn" class="swap-btn">⇅</button>

                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon">🏁</span>
                        <input type="text" id="destinationInput" placeholder="輸入目的地" autocomplete="off" data-type="dest">
                    </div>
                    <div id="destinationDropdown" class="autocomplete-dropdown hidden"></div>
                </div>

                <button id="searchBtn" class="primary-btn">規劃最佳路線</button>
            </div>

            <div class="results-area">
                <div id="statusMessage" class="status-message hidden"></div>
                <div id="loading" class="loading-wrapper hidden">
                    <div class="spinner"></div><p>AI 路由計算中...</p>
                </div>
                <div id="routesContainer" class="routes-container">
                    </div>
            </div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
