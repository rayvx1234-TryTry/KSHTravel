<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Transit PRO 高雄綜合智慧轉乘系統</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <div class="logo">🚆 K-Transit PRO<br><span>高雄全能綜合轉乘系統</span></div>
                <button id="themeToggle" class="icon-btn theme-btn">🌙</button>
            </header>

            <div class="control-panel">
                <div class="avatar-selector">
                    <span>角色：</span>
                    <button class="avatar-btn active" data-avatar="🧍‍♂️">🧍‍♂️</button>
                    <button class="avatar-btn" data-avatar="🧍‍♀️">🧍‍♀️</button>
                    <button class="avatar-btn" data-avatar="🚴">🚴</button>
                    <button class="avatar-btn" data-avatar="🐱">🐱</button>
                    <button class="avatar-btn" data-avatar="🐶">🐶</button>
                </div>

                <div class="input-section">
                    <div class="input-wrapper">
                        <span class="input-icon">📍</span>
                        <input type="text" id="originInput" placeholder="輸入起點 或 使用目前位置" data-location-type="origin" autocomplete="off">
                        <button id="useLocationBtn" class="icon-btn small location-btn">🎯</button>
                        <div id="originDropdown" class="autocomplete-dropdown hidden"></div>
                    </div>
                    
                    <button id="swapBtn" class="swap-btn">⇅</button>

                    <div class="input-wrapper">
                        <span class="input-icon">🏁</span>
                        <input type="text" id="destinationInput" placeholder="輸入目的地" data-location-type="destination" autocomplete="off">
                        <div id="destinationDropdown" class="autocomplete-dropdown hidden"></div>
                    </div>
                </div>

                <div class="filters">
                    <button class="filter-tag active" data-transit="mixed">🌟 最佳綜合</button>
                    <button class="filter-tag active" data-transit="mrt">捷運</button>
                    <button class="filter-tag active" data-transit="lightrail">輕軌</button>
                    <button class="filter-tag active" data-transit="bus">公車</button>
                </div>

                <button id="searchBtn" class="primary-btn">規劃最佳路線</button>
            </div>

            <div id="resultsArea" class="results-area">
                <div id="loadingIndicator" class="hidden loading-box">
                    <div class="spinner"></div>
                    <p>綜合演算法精算中...</p>
                </div>
                
                <div id="listView">
                    <div id="routesContainer">
                        <p class="empty-state">請輸入起訖點，開啟高雄最佳跨運具導航。</p>
                    </div>
                </div>

                <div id="detailView" class="hidden">
                    <button id="backToListBtn" class="back-btn">⬅ 返回方案列表</button>
                    <div id="detailContent"></div>
                </div>
            </div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
            <div id="avatarToast" class="toast hidden"></div>
        </main>

        <button id="mobileToggleBtn" class="mobile-toggle-btn hidden">🗺️ 切換地圖</button>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
