<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Transit  高雄綜合智慧轉乘系統</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-splash-screen" class="pure-white-splash">
    <div class="laser-container">
        <div class="laser-beam"></div>
        
        <div class="ksh-logo-shield">
            <span class="monogram">KSH</span>
        </div>
        
        <div class="brand-text-group">
            <h1 class="main-title">KSHtravel</h1>
            <p class="sub-title-zh">高雄綜合智慧轉乘系統</p>
            <p class="sub-title-en">Kaohsiung Smart Transit & Transfer System</p>
        </div>
    </div>
</div>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <div class="logo">🚆 K-Transit PRO<br><span>高雄全能綜合轉乘系統</span></div>
                <div class="header-actions">
                    <button id="togglePanelBtn" class="icon-btn hidden" title="修改/展開搜尋面板">🔍</button>
                    <button id="themeToggle" class="icon-btn theme-btn">🌙</button>
                </div>
            </header>

            <div id="searchPanel" class="control-panel">
                <div class="avatar-selector">
                    <span>角色：</span>
                    <button class="avatar-btn active" data-avatar="🧍‍♂️">🧍‍♂️</button>
                    <button class="avatar-btn" data-avatar="🧍‍♀️">🧍‍♀️</button>
                    <button class="avatar-btn" data-avatar="🚴">🚴</button>
                    <button class="avatar-btn" data-avatar="🐱">🐱</button>
                    <button class="avatar-btn" data-avatar="🐶">🐶</button>
                </div>

                <div class="input-section">
                    <div class="input-wrapper">
                        <span class="input-icon">📍</span>
                        <input type="text" id="originInput" placeholder="輸入起點 或 使用目前位置" data-location-type="origin" autocomplete="off">
                        <button id="useLocationBtn" class="icon-btn small location-btn" title="使用當前定位">🎯</button>
                        <div id="originDropdown" class="autocomplete-dropdown hidden"></div>
                    </div>
                    
                    <button id="swapBtn" class="swap-btn">⇅</button>

                    <div class="input-wrapper">
                        <span class="input-icon">🏁</span>
                        <input type="text" id="destinationInput" placeholder="輸入目的地" data-location-type="destination" autocomplete="off">
                        <div id="destinationDropdown" class="autocomplete-dropdown hidden"></div>
                    </div>
                </div>

                <div class="link-shortcuts">
                    <div class="shortcut-tag tag-mixed">🌟 最佳綜合</div>
                    <a href="https://www.krtc.com.tw/Guide/timetable" target="_blank" class="shortcut-tag tag-mrt">🚇 捷運 🔗</a>
                    <a href="https://www.krtc.com.tw/KLRT/klrt03" target="_blank" class="shortcut-tag tag-lrt">🍏 輕軌 🔗</a>
                    <a href="https://ibus.tbkc.gov.tw/ibus/" target="_blank" class="shortcut-tag tag-bus">🚌 公車 🔗</a>
                </div>

                <button id="searchBtn" class="primary-btn">規劃最佳路線</button>
            </div>

            <div id="resultsArea" class="results-area">
                <div id="loadingIndicator" class="hidden loading-box">
                    <div class="spinner"></div>
                    <p>智慧跨運具演算法精算中...</p>
                </div>
                
                <div id="listView">
                    <div id="routesContainer">
                        <p class="empty-state">請輸入起訖點，開啟高雄最佳跨運具導航。</p>
                    </div>
                </div>

                <div id="detailView" class="hidden">
                    <button id="backToListBtn" class="back-btn">⬅ 返回方案列表</button>
                    <div id="detailContent"></div>
                </div>
            </div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
        </main>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
<button class="ksh-feedback-fab" onclick="openFeedbackModal()" title="路線有誤或提供建議">
  <span>⚠️ 路線申報 / 建議</span>
</button>

<div id="feedback-modal" class="fb-modal-overlay">
  <div class="fb-modal-window">
    <div class="fb-modal-header">
      <h3>💡 路線申報與意見回饋</h3>
      <span class="fb-close-btn" onclick="closeFeedbackModal()">&times;</span>
    </div>
    <div class="fb-modal-body">
      <div class="fb-quick-rate">
        <button class="rate-btn positive" onclick="sendAutoRecord('滿意'); closeFeedbackModal();">👍 路線很讚</button>
      </div>
      
      <hr style="border: 0; border-top: 1px solid rgba(177, 138, 74, 0.2); margin: 15px 0;">

      <div class="fb-info-preview">
        <p><strong>出發地：</strong> <span id="preview-origin">偵測中...</span></p>
        <p><strong>目的地：</strong> <span id="preview-destination">偵測中...</span></p>
      </div>
      
      <label for="fb-type">回饋類型</label>
      <select id="fb-type">
        <option value="有更佳路線">💡 有更佳路線（推薦我的私房祕技）</option>
        <option value="轉乘時間不足">⏳ 轉乘時間不足 / 步行太遠</option>
        <option value="票價錯誤">💰 票價錯誤</option>
        <option value="班次資訊落後">🚌 班次資訊落後</option>
        <option value="地圖標記錯誤">📍 地圖標記錯誤</option>
        <option value="給開發者的話">💬 給開發者的話</option>
      </select>

      <label for="fb-comment">具體描述</label>
      <textarea id="fb-comment" placeholder="請告訴我們更詳細的狀況...例如這條路線走太久了！" rows="4"></textarea>

      <label for="fb-contact">聯絡方式 (選填)</label>
      <input type="text" id="fb-contact" placeholder="Email 或 Line ID">
      
      <button class="btn-submit-feedback" onclick="submitFullFeedback()">送出申報</button>
    </div>
  </div>
</div>
