x<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高雄大眾運輸全能導航 V5</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="control-panel">
            <div class="panel-header">
                <div class="header-title">
                    <h1>🚇 K-Transit</h1>
                    <p>高雄全能智慧轉乘系統</p>
                </div>
                <button id="themeToggle" class="theme-btn" title="切換夜間模式">🌙</button>
            </div>

            <div class="avatar-section">
                <span class="section-label">小人偶造型：</span>
                <div class="avatar-picker">
                    <button class="avatar-btn active" data-avatar="🧍‍♂️">🧍‍♂️</button>
                    <button class="avatar-btn" data-avatar="🧍‍♀️">🧍‍♀️</button>
                    <button class="avatar-btn" data-avatar="🚴">🚴</button>
                    <button class="avatar-btn" data-avatar="🥷">🥷</button>
                    <button class="avatar-btn" data-avatar="🐱">🐱</button>
                </div>
            </div>

            <div class="search-section">
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📍</span>
                        <input type="text" id="originInput" placeholder="輸入起點 或 使用目前位置" autocomplete="off" data-location-type="origin">
                        <button id="useLocationBtn" class="action-icon-btn" title="定位我的位置">🎯</button>
                    </div>
                    <div id="originDropdown" class="autocomplete-dropdown hidden"></div>
                </div>

                <button id="swapBtn" class="swap-btn" title="對調起終點">⇅</button>

                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🏁</span>
                        <input type="text" id="destinationInput" placeholder="輸入目的地" autocomplete="off" data-location-type="destination">
                    </div>
                    <div id="destinationDropdown" class="autocomplete-dropdown hidden"></div>
                </div>

                <div class="filter-wrapper">
                    <div class="transit-filters">
                        <button class="filter-tag active" data-transit="mrt">捷運</button>
                        <button class="filter-tag active" data-transit="lightrail">輕軌</button>
                        <button class="filter-tag active" data-transit="bus">公車</button>
                        <button class="filter-tag active" data-transit="bike">YouBike</button>
                    </div>
                </div>

                <button id="searchBtn" class="primary-search-btn">規劃智慧路線</button>
            </div>

            <div class="view-container">
                <div id="resultsView" class="results-area">
                    <div id="errorMessage" class="error-box hidden"></div>
                    <div id="loadingIndicator" class="loading-box hidden">
                        <div class="spinner"></div>
                        <p>最佳路線計算中...</p>
                    </div>
                    <div id="routesContainer" class="routes-container"></div>
                </div>

                <div id="detailView" class="detail-area hidden">
                    <button id="backToListBtn" class="back-btn">⬅️ 返回路線列表</button>
                    <div id="detailContent" class="detail-content"></div>
                </div>
            </div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
